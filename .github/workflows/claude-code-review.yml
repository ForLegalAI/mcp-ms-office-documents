name: Claude Code Review

# Automatically reviews every pull request when it is opened or updated.
# Remove this file (or restrict the `on:` filters) if you prefer to trigger
# reviews manually with an "@claude review" comment via claude.yml instead.
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write      # post the review and inline comments
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so the diff can be analysed

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          # Subscription auth (Pro/Max): generate with `claude setup-token`.
          # For a pay-as-you-go API key instead, use:
          #   anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review the pull request for correctness bugs, edge cases, security
            issues, and clear simplifications. Be concise and specific. Post the
            findings as a PR review with inline comments on the relevant lines
            using `gh pr comment` / the GitHub review API.
          # Allow the tools needed to read the diff and leave comments.
          claude_args: "--allowed-tools Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*)"
